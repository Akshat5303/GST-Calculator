<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2196F3">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="my-app-icon.png">
    <title>GST Calculator</title>
    <style>
        :root {
            --primary: #2196F3;
            --orange: #ff9800;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text-dark: #212529;
            --text-light: #6c757d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            z-index: 10;
        }

        .display {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: right;
            background: white;
            min-height: 220px;
        }

        #expression {
            font-size: 18px;
            color: var(--text-light);
            min-height: 24px;
            margin-bottom: 5px;
        }

        #main-num {
            font-size: 48px;
            font-weight: 700;
            margin: 0;
            color: var(--text-dark);
        }

        .gst-breakdown {
            margin-top: 15px;
            border-top: 2px solid #f1f1f1;
            padding-top: 10px;
            display: none;
        }

        .row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            margin-bottom: 4px;
            color: var(--text-light);
        }

        .total-line {
            font-size: 24px;
            font-weight: 800;
            color: #000;
            margin-top: 8px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            background: #e0e0e0;
            gap: 1px;
            border-top: 1px solid #e0e0e0;
        }

        button {
            height: 72px;
            border: none;
            background: white;
            font-size: 22px;
            font-weight: 500;
            cursor: pointer;
        }

        button:active { background: #f5f5f5; }
        
        .tax-btn { background: #fdfdfd; font-size: 15px; color: #444; }
        .op-btn { background: var(--orange); color: white; }
        .ac-btn { background: #fce4e4; color: #c0392b; }

        #history-panel {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 75%;
            background: white;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.2);
            transition: 0.3s ease-in-out;
            z-index: 20;
            border-radius: 20px 20px 0 0;
            display: flex;
            flex-direction: column;
        }

        #history-panel.active { bottom: 0; }

        .history-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .history-item {
            padding: 12px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        /* Install Prompt Styling */
        #install-bar {
            display: none;
            background: #333;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="install-bar" onclick="installApp()">📲 Install GST Pro App</div>
    
    <div class="header">
        <span>GST Calculator</span>
        <span onclick="toggleHistory()" style="cursor: pointer; font-size: 13px;">🕒 History</span>
    </div>

    <div class="display">
        <div id="expression"></div>
        <div id="main-num">0</div>
        
        <div id="gst-breakdown" class="gst-breakdown">
            <div class="row"><span>CGST (<span id="cp"></span>%)</span><span id="cv"></span></div>
            <div class="row"><span>SGST (<span id="sp"></span>%)</span><span id="sv"></span></div>
            <div class="row"><span>GST (<span id="gp"></span>%)</span><span id="gv"></span></div>
            <div class="row total-line"><span>Total</span><span id="gt"></span></div>
        </div>
    </div>

    <div class="keypad">
        <button class="tax-btn" onclick="calcGST(3, true)">+3%</button>
        <button class="tax-btn" onclick="calcGST(5, true)">+5%</button>
        <button class="tax-btn" onclick="calcGST(12, true)">+12%</button>
        <button class="tax-btn" onclick="calcGST(18, true)">+18%</button>
        <button class="tax-btn" onclick="calcGST(28, true)">+28%</button>

        <button class="tax-btn" onclick="calcGST(3, false)">-3%</button>
        <button class="tax-btn" onclick="calcGST(5, false)">-5%</button>
        <button class="tax-btn" onclick="calcGST(12, false)">-12%</button>
        <button class="tax-btn" onclick="calcGST(18, false)">-18%</button>
        <button class="tax-btn" onclick="calcGST(28, false)">-28%</button>

        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button class="op-btn" onclick="setOp('/')">÷</button>
        <button class="op-btn" onclick="back()">DEL</button>

        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button class="op-btn" onclick="setOp('*')">×</button>
        <button class="ac-btn" onclick="clearAll()">AC</button>

        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button class="op-btn" onclick="setOp('-')">-</button>
        <button class="op-btn" onclick="handlePercent()">%</button>

        <button onclick="press('0')">0</button>
        <button onclick="press('00')">00</button>
        <button onclick="press('.')">.</button>
        <button class="op-btn" onclick="setOp('+')">+</button>
        <button class="op-btn" onclick="solve()">=</button>
    </div>

    <div id="history-panel">
        <div class="history-header">
            <span>Past Calculations</span>
            <span style="color:var(--primary)" onclick="toggleHistory()">DONE</span>
        </div>
        <div id="history-list" class="history-list"></div>
        <button style="width:100%; height: 50px; color: red; background: none; border:none; border-top:1px solid #eee;" onclick="clearHistory()">Clear All History</button>
    </div>
</div>

<script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-bar').style.display = 'block';
    });

    function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
                document.getElementById('install-bar').style.display = 'none';
                deferredPrompt = null;
            });
        }
    }

    let cur = "0", mem = null, op = null, reset = false;
    let history = JSON.parse(localStorage.getItem('gst_v6_history') || '[]');

    const mainDisp = document.getElementById('main-num');
    const exprDisp = document.getElementById('expression');

    function fmt(n) { 
        return Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); 
    }

    function press(v) {
        document.getElementById('gst-breakdown').style.display = 'none';
        if (reset) { cur = v; reset = false; }
        else {
            if (v === "." && cur.includes(".")) return;
            cur = (cur === "0" && v !== ".") ? v : cur + v;
        }
        mainDisp.innerText = cur;
    }

    function setOp(nextOp) {
        if (op !== null && !reset) solve(); 
        mem = parseFloat(cur);
        op = nextOp;
        reset = true;
        exprDisp.innerText = mem + " " + op;
    }

    function addToHistory(inputStr, typeStr, resultStr) {
        history.unshift({
            input: inputStr,
            type: typeStr,
            result: resultStr,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        });
        if(history.length > 30) history.pop();
        localStorage.setItem('gst_v6_history', JSON.stringify(history));
        renderHistory();
    }

    function solve() {
        if (op === null) return;
        let c = parseFloat(cur);
        let result = 0;
        let eq = mem + " " + op + " " + c;

        if (op === '+') result = mem + c;
        if (op === '-') result = mem - c;
        if (op === '*') result = mem * c;
        if (op === '/') result = mem / c;

        exprDisp.innerText = eq + " =";
        addToHistory(eq, "=", fmt(result));

        cur = String(result);
        op = null;
        reset = true;
        mainDisp.innerText = cur;
    }

    function handlePercent() {
        let val = parseFloat(cur);
        let result = val / 100;
        exprDisp.innerText = val + " % =";
        addToHistory(val + " %", "=", fmt(result));
        cur = String(result);
        mainDisp.innerText = cur;
    }

    function calcGST(p, isAdd) {
        let val = parseFloat(cur);
        if(isNaN(val)) return;
        let gstAmt, final, typeLabel;

        if (isAdd) {
            gstAmt = val * (p / 100);
            final = val + gstAmt;
            typeLabel = `+${p}% GST`;
            exprDisp.innerText = val + " + " + p + "% GST";
        } else {
            final = val / (1 + (p / 100));
            gstAmt = val - final;
            typeLabel = `-${p}% GST (Incl)`;
            exprDisp.innerText = val + " - " + p + "% GST (Incl)";
        }

        document.getElementById('cp').innerText = (p/2);
        document.getElementById('sp').innerText = (p/2);
        document.getElementById('gp').innerText = p;
        document.getElementById('cv').innerText = fmt(gstAmt/2);
        document.getElementById('sv').innerText = fmt(gstAmt/2);
        const gv = document.getElementById('gv');
        gv.innerText = (isAdd ? "+" : "-") + fmt(gstAmt);
        gv.style.color = isAdd ? "#27ae60" : "#e74c3c";
        document.getElementById('gt').innerText = fmt(final);
        document.getElementById('gst-breakdown').style.display = 'block';

        addToHistory(fmt(val), typeLabel, fmt(final));
    }

    function clearAll() {
        cur = "0"; mem = null; op = null; reset = false;
        exprDisp.innerText = "";
        mainDisp.innerText = "0";
        document.getElementById('gst-breakdown').style.display = 'none';
    }

    function back() {
        cur = cur.length > 1 ? cur.slice(0, -1) : "0";
        mainDisp.innerText = cur;
    }

    function toggleHistory() { document.getElementById('history-panel').classList.toggle('active'); }

    function renderHistory() {
        document.getElementById('history-list').innerHTML = history.map(h => `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; font-size:12px; color:#888;">
                    <span>${h.input} ${h.type}</span><span>${h.time}</span>
                </div>
                <div style="font-size:18px; font-weight:bold; color:var(--primary);">Result: ${h.result}</div>
            </div>
        `).join('');
    }

    function clearHistory() { history = []; localStorage.setItem('gst_v6_history', '[]'); renderHistory(); }
    renderHistory();
</script>
</body>
</html>
